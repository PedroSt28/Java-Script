<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro pizzaria</title>
    <link rel="stylesheet" href="cadastro.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body class="principal">
    <main class="main">
      

      <div class="center">
        <form method="post" class="horigem">
        <h1><i class="fa-solid fa-pizza-slice"></i> Cadastrece já! <i class="fa-solid fa-pizza-slice"></i></h1>
          <div class="informations">
            
            <div class="cadastro">
              <label for="Nome"> <i class="fa-solid fa-user"></i> Nome:</label>
              <input type="text" id="Nome" placeholder="Name"/>
            </div>

            <div class="cadastro">
              <label for="email"> <i class="fa-regular fa-envelope"></i> Email:</label>
              <input type="email" id="email" placeholder="e-mail" />
            </div>

            <div class="cadastro">
              <label for="password"> <i class="fa-solid fa-lock"></i> Senha:</label>
              <input type="password" id="password" placeholder="Password" />
            </div>

            <div class="cadastro">
              <label for="Telefone"><i class="fa-solid fa-phone"></i> Telefone:</label>
              <input type="number" id="Telefone" />
            </div>
          </div>

            <div class="g-btn">
            <button class="btn">Cadastrar</button>
            <button class="btn">Login</button>
            
          </div>

          </div>

          <button><a href="pagina inicial.html">voltar</a></button>
        </form>
      </div>
    </main>
  </body>
</html>
