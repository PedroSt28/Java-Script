<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listas</title>
  </head>
  <body>

    <h1>Lista de compras organizado</h1>

    <ol>
      <li>maçã</li>
      <li>banana</li>
      <li>suco de laranja</li>
    </ol>

    <!-- abrviação "ol>li*3" acira as tags em ordem --- "ol" lista ordenada ou seja tem numeros -->

    <h1>Lista de compras desorganizado</h1>
    <ul>
        <li>maçã</li>
        <li>banana</li>
        <li>suco de laranja</li>
    </ul>

    <!-- lista  desordenada sem numeração no caso o mesmo atalho para os codigos -->

  </body>
</html>
