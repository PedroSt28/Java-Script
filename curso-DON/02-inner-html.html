<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <ul class="links">
        <li id="google"></li>
    </ul>

    
    <script>
        const url = "https://google.com"
        const googleLi = document.getElementById('google')
        googleLi.innerHTML = `
        <a target=_blank href='${url}' >Google</a>
        `
    </script>

</body>
</html>
