<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades e medidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Absolutas -->
<section  class="container">
     <p class="px">este texto esta em px</p>
     <p class="pt">este texto esta em pt</p>
     <p class="cm">este texto esta em cm</p>
     <p class="in">este texto esta em in</p>



     <!-- Relativas -->

      <p class="em">este texto esta em em</p>
      <p class="rem">este texto esta em rem</p>
      <div class="porcent">Essa div esta em %</div>
      <div class="vh">Essa div esta em vh</div>
      <div class="vw">Essa div esta em vw</div>
      <div class="vmax">Essa div esta em vmax</div>
     <div class="vmin">Essa div esta em vmin</div>
</section>                     
</body>
</html>
